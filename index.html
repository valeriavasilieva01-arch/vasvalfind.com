<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F4F0;--ink:#141311;--mut:#6E6862;--line:#E4DED6;--card:#fff}
body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
.wrap{max-width:1160px;margin:0 auto;padding:0 20px}
h1,h2,h3,.serif{font-family:Newsreader,Georgia,serif;font-weight:400;letter-spacing:-.015em}
a{color:inherit;text-decoration:none}
img{max-width:100%}

header{background:var(--ink);color:#F7F4F0;position:sticky;top:0;z-index:50}
.hd{display:flex;align-items:center;gap:28px;height:66px}
.logo .n{font-family:Newsreader,serif;font-size:23px;line-height:1}
.logo .s{font-size:9px;letter-spacing:.34em;opacity:.65;margin-top:2px}
nav{display:flex;gap:22px;font-size:14px;opacity:.9}
nav a:hover{opacity:.6}
.hd .right{margin-left:auto;display:flex;align-items:center;gap:14px}
select.lang{background:transparent;border:1px solid rgba(255,255,255,.25);color:#F7F4F0;border-radius:8px;padding:6px 8px;font-size:13px;font-family:inherit}
select.lang option{color:#141311}
.btn{display:inline-block;border:0;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;padding:11px 20px;border-radius:10px;background:var(--ink);color:#F7F4F0;transition:.15s}
.btn:hover{opacity:.85}
.btn.light{background:#F7F4F0;color:var(--ink)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.lnk{font-size:14px;opacity:.9}

.hero{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding:64px 0 40px}
.hero h1{font-size:56px;line-height:1.04}
.hero p{color:var(--mut);margin:18px 0 26px;max-width:400px}
.hero .cta{display:flex;gap:10px;flex-wrap:wrap}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;height:300px}
.tile{border-radius:14px;overflow:hidden;display:flex;align-items:flex-end;padding:14px;
background-color:#2E2A26;background-size:cover;background-position:center;
background-image:linear-gradient(155deg,#544A3E,#211E1B)}
.tile:nth-child(2){background-image:linear-gradient(155deg,#63563F,#231F1A)}
.tile:nth-child(3){background-image:linear-gradient(155deg,#443F38,#1B1917)}
.tile b{display:block;color:#fff;font-weight:500;font-size:15px;line-height:1.3}
.tile i{display:block;color:rgba(255,255,255,.78);font-style:normal;font-size:12px;margin-top:3px;line-height:1.3}

.search{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px;display:flex;gap:4px;align-items:center;margin-bottom:14px}
.fld{flex:1;padding:8px 14px;border-right:1px solid var(--line)}
.fld:last-of-type{border:0}
.fld label{display:block;font-size:11px;color:var(--mut);margin-bottom:2px}
.fld input{border:0;background:transparent;font-family:inherit;font-size:14px;width:100%;color:var(--ink);outline:none}
.search .btn{padding:14px 30px}
.note{font-size:12.5px;color:var(--mut);text-align:center;margin-bottom:44px}

.cats{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:56px}
.cat{text-align:center;padding:14px 8px;border-radius:12px;transition:.15s}
.cat:hover{background:var(--bg)}
.cat svg{stroke:var(--ink);fill:none;stroke-width:1.3;margin-bottom:8px}
.cat b{display:block;font-weight:500;font-size:14px}
.cat span{font-size:12px;color:var(--mut)}

.sec{padding:8px 0 56px}
.sec h2{font-size:34px;margin-bottom:6px}
.sub{color:var(--mut);margin-bottom:22px}
.tabs{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:22px}
.tabs button{border:0;background:transparent;font-family:inherit;font-size:14px;padding:9px 18px;border-radius:8px;cursor:pointer;color:var(--mut)}
.tabs button.on{background:var(--ink);color:#F7F4F0}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:8px}
.card h3{font-size:20px}
.card .m{font-size:13px;color:var(--mut)}
.card .row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;padding-top:14px;border-top:1px solid var(--line)}
.card .p{font-family:Newsreader,serif;font-size:22px}
.card .p small{font-size:11px;color:var(--mut);font-family:Inter,sans-serif;display:block}
.card .btn{padding:9px 16px;font-size:13px}

.trust{background:var(--ink);color:#F7F4F0;border-radius:18px;padding:38px;display:grid;grid-template-columns:repeat(3,1fr);gap:34px;margin-bottom:56px}
.trust b{font-family:Newsreader,serif;font-weight:400;font-size:19px;display:block;margin-bottom:6px}
.trust p{font-size:13.5px;opacity:.72;line-height:1.6}

.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:34px}
.step .n{font-family:Newsreader,serif;font-size:32px;opacity:.28}
.step b{display:block;font-weight:500;margin:6px 0 4px}
.step p{font-size:13.5px;color:var(--mut)}

.form{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px;max-width:620px}
.form .f{margin-bottom:16px}
.form label{display:block;font-size:13px;color:var(--mut);margin-bottom:6px}
.form input,.form select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;background:var(--bg);color:var(--ink)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.calc{background:var(--bg);border-radius:11px;padding:14px 16px;font-size:13.5px;margin-bottom:18px}
.calc div{display:flex;justify-content:space-between;padding:3px 0}
.calc .net{font-weight:600;border-top:1px solid var(--line);margin-top:5px;padding-top:8px}
.chk{display:flex;gap:10px;align-items:flex-start;font-size:13px;margin-bottom:10px;color:var(--mut)}
.chk input{width:16px;height:16px;margin-top:2px;flex:0 0 auto}
.legal{font-size:12.5px;color:var(--mut);border-left:2px solid var(--line);padding-left:14px;margin:20px 0}
.legal p{margin-bottom:5px}

footer{border-top:1px solid var(--line);margin-top:40px;padding:34px 0 50px;font-size:13px;color:var(--mut)}
footer .fl{display:flex;gap:26px;flex-wrap:wrap;margin-bottom:16px}

/* админ */
#abar{position:fixed;left:0;right:0;bottom:0;z-index:100;background:var(--ink);color:#F7F4F0;padding:10px 14px;display:none;gap:8px;align-items:center;font-size:12px;flex-wrap:wrap}
#abar.on{display:flex}
#abar #ast{opacity:.7;margin-right:auto;flex:1 1 100%}
#abar button{font-family:inherit;font-size:13px;padding:9px 13px;border-radius:9px;border:0;cursor:pointer;background:#F7F4F0;color:var(--ink)}
#abar button.g{background:transparent;color:#F7F4F0;border:1px solid rgba(255,255,255,.3)}
body.edit [data-i],body.edit [data-src]{outline:1px dashed rgba(20,19,17,.4);outline-offset:2px;border-radius:3px}
body.edit header [data-i]{outline-color:rgba(255,255,255,.4)}
#expwrap{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;padding:16px;align-items:center;justify-content:center}
#expwrap.on{display:flex}
#expbox{background:#fff;border-radius:14px;padding:16px;width:100%;max-width:560px}
#expbox p{font-size:13px;margin-bottom:9px}
#exp{width:100%;height:36vh;font-family:ui-monospace,Menlo,monospace;font-size:10px;border:1px solid var(--line);border-radius:9px;padding:8px}

@media(max-width:900px){
.hero{grid-template-columns:1fr;padding:38px 0 28px}.hero h1{font-size:40px}
.tiles{height:180px;gap:7px}.tile{padding:10px}.tile b{font-size:13px}.tile i{font-size:11px}
.search{flex-wrap:wrap}.fld{flex:1 1 45%;border-right:0}
.search .btn{width:100%}.cats{grid-template-columns:repeat(2,1fr)}
.grid,.trust,.steps{grid-template-columns:1fr}nav{display:none}
.sec h2{font-size:27px}.form{padding:22px}.trust{padding:26px}
}
</style>
</head>

let L=localStorage.getItem("vv")||"ru",TAB="A",edit=false;
const eur=n=>n.toFixed(2).replace(".",",")+" €";
const $=id=>document.getElementById(id);

function saveLocal(){try{localStorage.setItem("vvd",JSON.stringify({T:T,NEED:NEED,OFFER:OFFER}))}catch(e){}}
function loadLocal(){try{
  const d=JSON.parse(localStorage.getItem("vvd"));if(!d)return;
  if(d.T)for(const k in d.T){T[k]=Object.assign(T[k]||{},d.T[k])}
  if(d.NEED){NEED.length=0;d.NEED.forEach(x=>NEED.push(x))}
  if(d.OFFER){OFFER.length=0;d.OFFER.forEach(x=>OFFER.push(x))}
}catch(e){}}
loadLocal();

function render(){
  const d=T[L];
  document.querySelectorAll("[data-i]").forEach(e=>{
    e.textContent=d[e.dataset.i]||"";
    if(e.tagName!=="OPTION")e.contentEditable=edit?"true":"false";
  });
  document.querySelectorAll("[data-ph]").forEach(e=>e.placeholder=d[e.dataset.ph]||"");
  document.documentElement.lang=L;
  const arr=TAB==="A"?NEED:OFFER,k=TAB==="A"?"N":"O",ce=edit?' contenteditable="true"':'';
  $("grid").innerHTML=arr.map((x,i)=>`
    <article class="card">
      <h3${ce} data-src="${k}" data-idx="${i}" data-f="0">${x[L][0]}</h3>
      <div class="m"${ce} data-src="${k}" data-idx="${i}" data-f="1">${x[L][1]}</div>
      <div class="row">
        <div class="p"><span${ce} data-src="${k}" data-idx="${i}" data-f="p">${x.p}</span> €<small>${x.h?d.perh:d.per}</small></div>
        <button type="button" class="btn">${d.resp}</button>
      </div>
    </article>`).join("");
  calc();
}
function calc(){
  const v=+$("pr").value||0;
  $("fee").textContent=eur(v*0.15);
  $("net").textContent=eur(v*0.85);
}

$("lang").value=L;
$("lang").onchange=e=>{L=e.target.value;localStorage.setItem("vv",L);render()};
$("tabA").onclick=()=>{TAB="A";tabA.classList.add("on");tabB.classList.remove("on");render()};
$("tabB").onclick=()=>{TAB="B";tabB.classList.add("on");tabA.classList.remove("on");render()};
$("pr").oninput=calc;

document.addEventListener("input",e=>{
  if(!edit)return;
  const t=e.target;if(!t.dataset)return;
  if(t.dataset.i){T[L][t.dataset.i]=t.textContent}
  else if(t.dataset.src){
    const a=t.dataset.src==="N"?NEED:OFFER,i=+t.dataset.idx,f=t.dataset.f;
    if(f==="p")a[i].p=parseFloat(t.textContent.replace(",","."))||0;
    else a[i][L][+f]=t.textContent;
  }else return;
  saveLocal();
});
document.addEventListener("click",e=>{
  if(!edit)return;
  const el=e.target.closest("a,button");
  if(el&&!el.closest("#abar,#expbox")&&el.id!=="tabA"&&el.id!=="tabB")e.preventDefault();
},true);

if(location.hash==="#admin"&&prompt("Код доступа")===PIN){
  $("abar").classList.add("on");
  document.body.style.paddingBottom="86px";
  $("ast").textContent="Правки сохраняются только на этом телефоне";
}
$("aedit").onclick=function(){
  edit=!edit;
  document.body.classList.toggle("edit",edit);
  this.textContent=edit?"Готово":"Редактировать";
  $("ast").textContent=edit?"Нажмите на любой текст и меняйте":"Правки сохраняются только на этом телефоне";
  render();
};
$("areset").onclick=()=>{if(confirm("Удалить все неопубликованные правки?")){localStorage.removeItem("vvd");location.reload()}};
$("cl").onclick=()=>$("expwrap").classList.remove("on");
$("cp").onclick=async()=>{
  const t=$("exp");
  try{await navigator.clipboard.writeText(t.value);$("cp").textContent="Скопировано"}
  catch(e){t.removeAttribute("readonly");t.select();document.execCommand("copy");t.setAttribute("readonly","")}
};
$("apub").onclick=async()=>{
  const M1="/*DATA_"+"START*/",M2="/*DATA_"+"END*/";
  try{
    const src=await (await fetch(location.pathname,{cache:"no-store"})).text();
    const a=src.indexOf(M1),b=src.indexOf(M2);
    if(a<0||b<0){alert("Не найден блок данных");return}
    const data=M1+"\nconst T="+JSON.stringify(T)+";\nconst NEED="+JSON.stringify(NEED)+";\nconst OFFER="+JSON.stringify(OFFER)+";\n"+M2;
    $("exp").value=src.slice(0,a)+data+src.slice(b+M2.length);
    $("cp").textContent="Копировать";
    $("expwrap").classList.add("on");
  }catch(e){alert("Не получилось собрать файл: "+e.message)}
};

render();
</script>
