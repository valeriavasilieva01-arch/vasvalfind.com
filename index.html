<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F4F0;--ink:#141311;--mut:#6E6862;--line:#E4DED6;--card:#fff}
body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
.wrap{max-width:1160px;margin:0 auto;padding:0 20px}
h1,h2,h3,.serif{font-family:Newsreader,Georgia,serif;font-weight:400;letter-spacing:-.015em}
a{color:inherit;text-decoration:none}

header{background:var(--ink);color:#F7F4F0;position:sticky;top:0;z-index:50}
.hd{display:flex;align-items:center;gap:28px;height:66px}
.logo .n{font-family:Newsreader,serif;font-size:23px;line-height:1}
.logo .s{font-size:9px;letter-spacing:.34em;opacity:.65;margin-top:2px}
nav{display:flex;gap:22px;font-size:14px;opacity:.9}
.hd .right{margin-left:auto;display:flex;align-items:center;gap:14px}
select.lang{background:transparent;border:1px solid rgba(255,255,255,.25);color:#F7F4F0;border-radius:8px;padding:6px 8px;font-size:13px;font-family:inherit}
select.lang option{color:#141311}
.btn{display:inline-block;border:0;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;padding:11px 20px;border-radius:10px;background:var(--ink);color:#F7F4F0;transition:.15s}
.btn.light{background:#F7F4F0;color:var(--ink)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.lnk{font-size:14px;opacity:.9}

.hero{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding:64px 0 40px}
.hero h1{font-size:52px;line-height:1.05}
.hero p{color:var(--mut);margin:18px 0 26px;max-width:400px}
.hero .cta{display:flex;gap:10px;flex-wrap:wrap}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;height:300px}
.tile{border-radius:14px;overflow:hidden;display:flex;align-items:flex-end;padding:14px;background:#2E2A26;background-image:linear-gradient(155deg,#544A3E,#211E1B)}
.tile:nth-child(2){background-image:linear-gradient(155deg,#63563F,#231F1A)}
.tile:nth-child(3){background-image:linear-gradient(155deg,#443F38,#1B1917)}
.tile b{display:block;color:#fff;font-weight:500;font-size:15px}
.tile i{display:block;color:rgba(255,255,255,.78);font-style:normal;font-size:12px;margin-top:3px}

.search{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px;display:flex;gap:4px;align-items:flex-end;margin-bottom:14px;flex-wrap:wrap}
.fld{flex:1;min-width:120px;padding:8px 12px;border-right:1px solid var(--line)}
.fld:last-of-type{border:0}
.fld label{display:block;font-size:11px;color:var(--mut);margin-bottom:4px}
.fld input,.fld select{border:0;background:transparent;font-family:inherit;font-size:14px;width:100%;color:var(--ink);outline:none}
.search .btn{padding:13px 26px}
.note{font-size:12.5px;color:var(--mut);text-align:center;margin-bottom:44px}

.cats{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:56px}
.cats h3{font-size:13px;color:var(--mut);font-family:Inter,sans-serif;font-weight:600;margin-bottom:16px;letter-spacing:.02em}
.catgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.cat{text-align:center;padding:14px 6px;border-radius:12px;background:var(--bg);font-size:13px;font-weight:500}

.sec{padding:8px 0 56px}
.sec h2{font-size:34px;margin-bottom:6px}
.sub{color:var(--mut);margin-bottom:22px}
.tabs{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:22px}
.tabs button{border:0;background:transparent;font-family:inherit;font-size:14px;padding:9px 18px;border-radius:8px;cursor:pointer;color:var(--mut)}
.tabs button.on{background:var(--ink);color:#F7F4F0}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:8px}
.card h3{font-size:19px}
.card .m{font-size:13px;color:var(--mut)}
.card .row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;padding-top:14px;border-top:1px solid var(--line)}
.card .p{font-family:Newsreader,serif;font-size:22px}
.card .p small{font-size:11px;color:var(--mut);font-family:Inter,sans-serif;display:block}
.card .btn{padding:9px 16px;font-size:13px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#EAE4DA;color:#5A5248;width:fit-content}

.trust{background:var(--ink);color:#F7F4F0;border-radius:18px;padding:38px;display:grid;grid-template-columns:repeat(3,1fr);gap:34px;margin-bottom:56px}
.trust b{font-family:Newsreader,serif;font-weight:400;font-size:19px;display:block;margin-bottom:6px}
.trust p{font-size:13.5px;opacity:.72;line-height:1.6}

.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:34px}
.step .n{font-family:Newsreader,serif;font-size:32px;opacity:.28}
.step b{display:block;font-weight:500;margin:6px 0 4px}
.step p{font-size:13.5px;color:var(--mut)}

.form{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px;max-width:640px}
.form .f{margin-bottom:16px}
.form label{display:block;font-size:13px;color:var(--mut);margin-bottom:6px}
.form input,.form select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;background:var(--bg);color:var(--ink)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.seg{display:flex;gap:8px;margin-bottom:16px}
.seg label{flex:1;border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;font-size:13px;cursor:pointer;background:var(--bg)}
.seg input{display:none}
.seg input:checked+span{font-weight:600}
.seg label:has(input:checked){border-color:var(--ink);background:#fff}
.docnote{font-size:12px;color:var(--mut);background:var(--bg);border-radius:10px;padding:12px 14px;margin-bottom:16px;display:none}
.calc{background:var(--bg);border-radius:11px;padding:14px 16px;font-size:13.5px;margin-bottom:18px}
.calc div{display:flex;justify-content:space-between;padding:3px 0}
.calc .net{font-weight:600;border-top:1px solid var(--line);margin-top:5px;padding-top:8px}
.chk{display:flex;gap:10px;align-items:flex-start;font-size:13px;margin-bottom:10px;color:var(--mut)}
.chk input{width:16px;height:16px;margin-top:2px;flex:0 0 auto}
.legal{font-size:12.5px;color:var(--mut);border-left:2px solid var(--line);padding-left:14px;margin:20px 0}
.legal p{margin-bottom:5px}

footer{border-top:1px solid var(--line);margin-top:40px;padding:34px 0 50px;font-size:13px;color:var(--mut)}
footer .fl{display:flex;gap:26px;flex-wrap:wrap;margin-bottom:16px}

@media(max-width:900px){
.hero{grid-template-columns:1fr;padding:38px 0 28px}.hero h1{font-size:38px}
.tiles{height:170px;gap:7px}.tile{padding:10px}.tile b{font-size:13px}.tile i{font-size:11px}
.fld{flex:1 1 45%;border-right:0}.search .btn{width:100%}
.catgrid{grid-template-columns:repeat(3,1fr)}
.grid,.trust,.steps{grid-template-columns:1fr}nav{display:none}
.sec h2{font-size:27px}.form{padding:22px}.trust{padding:26px}.two{grid-template-columns:1fr}
}
</style>
</head>

  <p class="sub" data-i="posts"></p>

    <div class="f"><label data-i="ftype"></label>
      <select name="type"><option data-i="fo1"></option><option data-i="fo2"></option></select></div>

    <label data-i="flevel" style="font-size:13px;color:var(--mut);display:block;margin-bottom:6px"></label>
    <div class="seg">
      <label><input type="radio" name="level" value="pro" id="lvpro"><span data-i="lvpro"></span></label>
      <label><input type="radio" name="level" value="beg" checked><span data-i="lvbeg"></span></label>
    </div>
    <div class="docnote" id="docnote" data-i="docnote"></div>

    <div class="f"><label data-i="ftitle"></label><input name="title" data-ph="ftitlep" required></div>
    <div class="two">
      <div class="f"><label data-i="fcat"></label><select name="cat" id="fcat"></select></div>
      <div class="f"><label data-i="fctry"></label><select name="country" id="fctry"></select></div>
    </div>
    <div class="two">
      <div class="f"><label data-i="fcity"></label><input name="city" data-ph="fcityp"></div>
      <div class="f"><label data-i="fdate"></label><input name="date" data-ph="fdatep"></div>
    </div>
    <div class="f"><label data-i="fprice"></label><input id="pr" name="price" type="number" value="150" min="1"></div>
    <div class="calc">
      <div><span data-i="calc1"></span><b id="fee">22,50 €</b></div>
      <div class="net"><span data-i="calc2"></span><b id="net">127,50 €</b></div>
    </div>
    <label class="chk"><input type="checkbox" name="statut" required><span data-i="chk1"></span></label>
    <label class="chk"><input type="checkbox" name="autonomie" required><span data-i="chk2"></span></label>
    <div class="f" style="margin-top:16px"><label>Email</label><input name="email" type="email" required></div>
    <button class="btn" style="width:100%" data-i="fsend"></button>
    <div class="legal">
      <p data-i="legal1"></p><p data-i="legal2"></p><p data-i="legal3"></p>
    </div>
  </form>
</section>

<footer>
  <div class="fl">
    <a href="#how" data-i="nav3"></a><a href="#post" data-i="post"></a>

  <p data-i="legal2" style="margin-bottom:6px"></p>
  <p>VasVal Talents OÜ · 17193380 · Tallinn, Estonia</p>
</footer>

let L=localStorage.getItem("vv")||"ru",TAB="A";
const eur=n=>n.toFixed(2).replace(".",",")+" €";
const $=id=>document.getElementById(id);

function fillSelect(el,withAll){
  const d=T[L];let h=withAll?`<option value="">${L==="ru"?"Все":L==="fr"?"Toutes":"All"}</option>`:"";
  for(const k of PRO){h+=`<option value="${k}">${CATS[k][L]}</option>`}
  el.innerHTML=h;
}
function fillCountries(el,withAll){
  const idx=L==="ru"?1:L==="fr"?2:3;
  let h=withAll?`<option value="">${L==="ru"?"Все страны":L==="fr"?"Tous pays":"All countries"}</option>`:"";
  for(const c of COUNTRIES){h+=`<option value="${c[0]}">${c[idx]}</option>`}
  el.innerHTML=h;
}

function render(){
  const d=T[L];
  document.querySelectorAll("[data-i]").forEach(e=>e.textContent=d[e.dataset.i]||"");
  document.querySelectorAll("[data-ph]").forEach(e=>e.placeholder=d[e.dataset.ph]||"");
  document.documentElement.lang=L;
  fillSelect($("scat"),true);fillSelect($("fcat"),false);
  fillCountries($("sctry"),true);fillCountries($("fctry"),false);
  $("catgrid").innerHTML=PRO.map(k=>`<div class="cat">${CATS[k][L]}</div>`).join("");
  const arr=TAB==="A"?NEED[L]:OFFER[L],isH=TAB==="B";
  $("grid").innerHTML=arr.map(x=>`
    <article class="card">
      ${isH?`<span class="badge">${d.pro}</span>`:""}
      <h3>${x[0]}</h3>
      <div class="m">${x[1]}</div>
      <div class="row">
        <div class="p">${x[2]} €<small>${isH?d.perh:d.per}</small></div>
        <button type="button" class="btn">${d.resp}</button>
      </div>
    </article>`).join("");
  calc();
}
function calc(){const v=+$("pr").value||0;$("fee").textContent=eur(v*0.15);$("net").textContent=eur(v*0.85);}

$("lang").value=L;
$("lang").onchange=e=>{L=e.target.value;localStorage.setItem("vv",L);render()};
$("tabA").onclick=()=>{TAB="A";tabA.classList.add("on");tabB.classList.remove("on");render()};
$("tabB").onclick=()=>{TAB="B";tabB.classList.add("on");tabA.classList.remove("on");render()};

$("lvpro").addEventListener("change",()=>$("docnote").style.display="block");

render();
